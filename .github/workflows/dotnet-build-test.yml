name: Build and Test

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore OpsPulse.sln

      - name: Build
        run: dotnet build OpsPulse.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test OpsPulse.sln --configuration Release --no-build
